{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h2>{{ '✏️ Editar' if proveedor else '➕ Nuevo' }} Proveedor</h2>
    <a href="/proveedores" class="btn btn-outline">← Volver</a>
</div>

<div class="card" style="max-width:500px;">
    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre del proveedor</label>
            <input type="text" id="nombre" name="nombre" class="form-control" value="{{ proveedor.nombre if proveedor else '' }}" required>
        </div>
        <div class="form-group">
            <label for="contacto">Contacto (teléfono / email)</label>
            <input type="text" id="contacto" name="contacto" class="form-control" value="{{ proveedor.contacto if proveedor else '' }}">
        </div>
        <div class="form-group">
            <label for="notas">Notas</label>
            <textarea id="notas" name="notas" class="form-control" rows="3">{{ proveedor.notas if proveedor else '' }}</textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">{{ 'Guardar' if proveedor else 'Crear proveedor' }}</button>
            <a href="/proveedores" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
